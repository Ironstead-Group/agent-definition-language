name: publish-release

# When a "release: <version>" PR (from a release/<version> branch, opened by
# cut-release.yml) is merged into main, create the GitHub Release: tag
# v<version> with the reviewed changelog as the body. No assets -- the IETF
# Internet-Draft is uploaded to the datatracker manually and is never published
# from the repo.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    env:
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_BODY: ${{ github.event.pull_request.body }}
    steps:
      - name: Prepare tag and release notes
        id: prep
        run: |
          version="${HEAD_REF#release/}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$PR_BODY" > "${{ runner.temp }}/notes.md"
          printf '\n_IETF Internet-Draft submitted to the datatracker separately._\n' \
            >> "${{ runner.temp }}/notes.md"

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.prep.outputs.version }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          name: ADL ${{ steps.prep.outputs.version }}
          body_path: ${{ runner.temp }}/notes.md
          make_latest: true
