# ADL 0.3.0-draft spec manifest
# Single source of truth for section structure. Used by scripts to generate
# body-specific output (IETF RFC, ISO, Linux Foundation, etc.).
version: "0.3.0-draft"
source: spec.md
schema: schema.json

# Layer taxonomy (two orthogonal axes, tagged per section and subsection).
# Generators (IETF, ISO, AAIF) use these to render the three-document split:
# ADL Core (declarative) | Trust Protocol | Runtime Protocol.
#
#   nature       — what KIND of content the section is:
#     constitutional  Declares what the agent IS / its standing posture.
#     operational     A runtime control whose behavior needs enforcement.
#     structural      Spec machinery / informative plumbing (neither claim
#                     about the agent nor a runtime control).
#
#   enforced_by  — which document holds (or will hold) the procedure that
#                  gives the section its teeth. Target-architecture basis:
#                  operational members point at `runtime` even while the
#                  Runtime Protocol is still a stub.
#     core     Enforced by Core's own processing/validation rules (the act
#              of validating the document already enforces the rule).
#     trust    Enforced by a Trust Protocol procedure (a counterparty acts).
#     runtime  Enforced by a Runtime Protocol procedure (a governor acts).
#     none     No enforcing procedure (purely declarative or informative).

# Section order and IDs. Generators use this to map spec sections to
# body-specific numbering (rfc_section, iso_clause, etc.).
sections:
