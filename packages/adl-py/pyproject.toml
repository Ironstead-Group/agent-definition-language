[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adl-spec"
version = "0.2.0"
description = "Reference implementation and SDK for the Agent Definition Language (ADL) — Python"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "ADL Working Group" }]
keywords = ["adl", "agent", "definition", "language", "verification", "passport"]
dependencies = [
    "cryptography>=42.0.0",
    "jsonschema>=4.21.0",
    "PyYAML>=6.0.1",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.urls]
Homepage = "https://adl-spec.org"
Repository = "https://github.com/Ironstead-Group/agent-definition-language"

[tool.hatch.build.targets.wheel]
packages = ["src/adl_spec"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
