$schema: https://adl-spec.org/0.2/schema.json
adl_spec: "0.2.0"
name: Research Assistant
description: >-
  Summarizes research papers and competitive intelligence sources for
  internal teams. Read-only over public and licensed corpora.
version: "2.1.0"
id: https://agents.acme.example/research-assistant

data_classification:
  sensitivity: internal
  categories:
    - intellectual_property

lifecycle:
  status: active
  effective_date: "2026-02-01T00:00:00Z"

provider:
  name: Acme Corp
  url: https://agents.acme.example
  contact: ai-platform@acme.example

cryptographic_identity:
  did: did:web:agents.acme.example:research-assistant
  public_key:
    algorithm: Ed25519
    value: REPLACED_AT_GATEWAY_STARTUP

model:
  provider: anthropic
  name: claude-sonnet-4-6
  context_window: 200000
  temperature: 0.3
  capabilities:
    - function_calling

system_prompt: >-
  You are a research assistant. Summarize papers, cite sources, and never
  fabricate citations.

tools:
  - name: search_papers
    description: Search for papers across configured corpora.
    parameters:
      type: object
      properties:
        query:
          type: string
        limit:
          type: integer
          default: 10
      required:
        - query
    read_only: true
    idempotent: true
  - name: summarize_paper
    description: Generate a structured summary of a paper.
    parameters:
      type: object
      properties:
        paper_id:
          type: string
      required:
        - paper_id
    read_only: true

permissions:
  network:
    allowed_hosts:
      - api.semanticscholar.org
      - arxiv.org
      - corpus.acme.example
    allowed_protocols:
      - https
    deny_private: true
  filesystem:
    allowed_paths:
      - path: /data/papers/**
        access: read
  resource_limits:
    max_memory_mb: 2048
    max_duration_sec: 180

security:
  authentication:
    type: oauth2
    required: true
    scopes:
      - papers:read
    token_endpoint: https://auth.acme.example/oauth/token
  encryption:
    in_transit:
      required: true
      min_version: "1.2"
  attestation:
    type: self
    issued_at: "2026-04-01T00:00:00Z"
    expires_at: "2027-04-01T00:00:00Z"

metadata:
  license: Proprietary
  documentation: https://docs.acme.example/agents/research-assistant
  tags:
    - research
    - internal
    - enterprise
